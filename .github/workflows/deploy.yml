name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download assets from GitBook CDN
        run: |
          mkdir -p public/files
          for id in 2dURuFOyjYIZlWLTnoeS 3uRW3wCwBHbU70Cy6e05 4UT3RznkgcHY5IV5cHIP BgEl4ciuyYVmX7MUlLzS IHSgS03k6EeAztU0R37g LCW3K4g66Hcj5u3fehV9 SoWCJ4E2SfKiJavPlBso U0y3i5QwmwfFK1O7VOxc fwtvd2K3rOweyrzSSXyC l6ELN6omciJ4eEADBDXB lOkyvNGvAyDaTC3BYPoA rr4k9k82mjW0FhuapV56 tsk3PrTCnjHXTBjmA5N6 wDTwqwwpmj2CwTvBbx34; do
            curl -sL "https://cdn.gitbook.com/files/${id}" -o "public/files/${id}" || true
          done

      - name: Build
        run: npm run build
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: '0'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
